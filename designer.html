<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Malak Essam | Elite Designer</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Amiri:ital@0;1&family=El+Messiri:wght@700&family=Montserrat:wght@300;900&family=Playfair+Display:ital@1&family=Cinzel:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00d4ff; --bg: #050505; }
        body { background: var(--bg); color: #fff; margin: 0; padding: 40px; font-family: 'Cairo', sans-serif; display: flex; justify-content: center; min-height: 100vh; }

        .main-frame {
            width: 100%; max-width: 1200px; padding: 50px;
            border: 2px solid var(--neon); border-radius: 40px;
            background: radial-gradient(circle at center, #111 0%, #050505 100%);
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.2), inset 0 0 20px rgba(0, 212, 255, 0.1);
            position: relative;
            /* إضافة تأثير الظهور التدريجي للصفحة */
            animation: pageFadeIn 1s ease-out forwards;
        }

        @keyframes pageFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .back-btn { 
            position: absolute; top: 30px; right: 30px; padding: 12px 30px;
            background: transparent; border: 2px solid var(--neon); color: var(--neon);
            border-radius: 15px; cursor: pointer; font-weight: bold; transition: 0.4s;
        }
        .back-btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }

        .title { text-align: center; font-size: 4rem; margin-bottom: 30px; color: #fff; text-shadow: 0 0 20px var(--neon); font-family: 'Cinzel', serif; animation: pulse 2s infinite alternate; }
        @keyframes pulse { from { opacity: 0.8; } to { opacity: 1; } }

        input { 
            display: block; margin: 0 auto 50px; background: rgba(0,0,0,0.8);
            border: 1px solid var(--neon); color: #fff; padding: 20px;
            border-radius: 15px; width: 50%; font-size: 1.5rem; text-align: center;
            transition: 0.3s; box-shadow: 0 0 10px rgba(0,212,255,0.2);
        }
        input:focus { box-shadow: 0 0 25px var(--neon); outline: none; }

        .result-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }

        .deco-item { 
            padding: 25px; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            background: rgba(255,255,255,0.02); cursor: pointer; transition: 0.4s;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; 
            animation: fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            position: relative; overflow: hidden;
        }
        .deco-item:hover { 
            border-color: var(--neon); box-shadow: 0 0 25px var(--neon);
            transform: scale(1.05); background: rgba(0,212,255,0.05);
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(30px) scale(0.9); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }

        #toast { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--neon); color: #000; padding: 15px 40px; 
            border-radius: 20px; display: none; font-weight: bold; font-size: 1.2rem;
            box-shadow: 0 0 30px var(--neon); z-index: 1000;
        }
    </style>
</head>
<body>

<div class="main-frame">
    <button class="back-btn" onclick="window.location.href='profile.html'">ارجع تانى</button>
    
    <div class="title">Welcome</div>
    <input type="text" id="in" placeholder="اكتبي اسمك هنا..." oninput="gen()">
    <div class="result-grid" id="out"></div>
</div>

<div id="toast">تم نسخ الخط! ✨</div>

<script>
    const fonts = ['Cairo', 'Amiri', 'El Messiri', 'Montserrat', 'Playfair Display', 'Cinzel'];
    
    function gen() {
        let v = document.getElementById('in').value;
        let o = document.getElementById('out');
        if(!v) { o.innerHTML = ""; return; }
        
        let html = "";
        for(let i=0; i<15; i++) {
            fonts.forEach((f, index) => {
                let delay = (i * fonts.length + index) * 0.03;
                html += `<div class="deco-item" style="font-family: '${f}'; font-size: 1.8rem; animation-delay: ${delay}s;" onclick="copyText('${v}')">${v}</div>`;
            });
        }
        o.innerHTML = html;
    }

    function copyText(text) {
        navigator.clipboard.writeText(text);
        let toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2000);
    }
</script>
</body>
</html>

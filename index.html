<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Welcome | Malak Essam</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #00d4ff; --bg: #050505; }
        
        body { 
            background: var(--bg); color: #fff; margin: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Montserrat', sans-serif; overflow: hidden;
        }

        /* تأثير الظهور التدريجي (Fade & Slide) */
        .fade-in-up {
            animation: fadeInOut 1.5s ease-out forwards;
        }
        @keyframes fadeInOut {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* إطار خارجي متوهج */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            padding: 50px; border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; width: 90%; max-width: 400px;
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.2);
            position: relative;
        }

        /* زخرفة نيونية دائرية */
        .glow-circle {
            position: absolute; width: 150px; height: 150px;
            border-radius: 50%; border: 2px solid var(--accent);
            top: -75px; left: calc(50% - 75px);
            background: var(--bg); display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--accent);
            animation: pulse 2s infinite; /* نبض نيون */
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 10px var(--accent); }
            50% { box-shadow: 0 0 30px var(--accent); }
            100% { box-shadow: 0 0 10px var(--accent); }
        }

        .title-text { font-family: 'Cairo', sans-serif; font-size: 1.6rem; margin-top: 50px; margin-bottom: 30px; }

        input { 
            width: 100%; padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05); color: #fff; text-align: center; font-size: 1.2rem;
            margin-bottom: 25px; box-sizing: border-box; outline: none; transition: 0.4s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }

        button { 
            width: 100%; padding: 20px; border-radius: 20px; border: none;
            background: linear-gradient(90deg, #00d4ff, #7000ff);
            color: white; font-weight: bold; cursor: pointer;
            font-size: 1.2rem; transition: 0.4s;
        }
        button:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--accent); }

        .signature { position: fixed; bottom: 30px; color: rgba(255,255,255,0.3); font-size: 0.9rem; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="glass-card fade-in-up">
        <div class="glow-circle"><i class="fa-solid fa-user-astronaut" style="font-size: 3rem; color: var(--accent);"></i></div>
        <p class="title-text"> Welcome to my website 😊<br><span style="color:var(--accent);"> حطى اسمك عشان الموقع يبدأ يشتغل👩🏻‍💻</span></p>
        <input type="text" id="username" placeholder="اكتبي اسمك هنا ✍️">
        <button onclick="enterSite()">Enter Now 🚀</button>
    </div>

    <div class="signature">DESIGNED BY MALAK ESSAM 👩🏻‍💻</div>

    <script>
        function enterSite() {
            const user = document.getElementById('username').value;
            if(user !== "") { 
                // تأثير الخروج عند الضغط
                document.body.style.opacity = '0';
                document.body.style.transition = '1s';
                setTimeout(() => { window.location.href = "profile.html"; }, 1000);
            } else {
                alert("لازم اسمك ي صديقتى ! 😊");
            }
        }
    </script>
</body>
</html>

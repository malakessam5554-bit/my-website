<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Malak Essam | Professional</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        
        :root { --bg: #f4f7f6; --text: #1a1a1a; --card: rgba(255,255,255,0.8); --accent: #00d4ff; }
        .dark-mode { --bg: #0a0a0c; --text: #ffffff; --card: rgba(255,255,255,0.05); }

        body { 
            background: var(--bg); color: var(--text); margin: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Montserrat', sans-serif; transition: 0.5s;
            animation: fadeInPage 1.5s ease-in;
        }
        @keyframes fadeInPage { from { opacity: 0; } to { opacity: 1; } }

        /* الأيقونة العلوية الاحترافية الواضحة */
        .theme-btn {
            position: absolute; top: 25px; right: 25px; width: 60px; height: 60px;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            border: 2px solid var(--accent); border-radius: 20px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; transition: 0.4s; color: var(--accent);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }
        .theme-btn:hover { transform: scale(1.1); background: var(--accent); color: white; box-shadow: 0 0 25px var(--accent); }

        /* التوقيع الفخم */
        .signature {
            font-size: 1.2rem; letter-spacing: 3px; margin-bottom: 50px; 
            border-bottom: 2px solid var(--accent); padding-bottom: 10px;
            text-shadow: 0 0 10px var(--accent);
        }

        /* المربع الرئيسي */
        .container {
            background: var(--card); backdrop-filter: blur(20px); padding: 50px;
            border-radius: 40px; text-align: center; width: 90%; max-width: 450px;
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        input { 
            width: 100%; padding: 20px; border-radius: 15px; border: 1px solid #555;
            background: transparent; color: var(--text); text-align: center; font-size: 1.2rem;
            margin-bottom: 25px; box-sizing: border-box; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }
        
        button { 
            width: 100%; padding: 20px; border-radius: 15px; border: none;
            background: var(--accent); color: white; font-weight: bold; cursor: pointer;
            font-size: 1.2rem; text-transform: uppercase; transition: 0.3s;
        }
        button:hover { transform: translateY(-5px); box-shadow: 0 5px 15px var(--accent); }
    </style>
</head>
<body>

    <button class="theme-btn" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>

    <div class="signature">
        <i class="fa-solid fa-crown"></i> DESIGNED BY MALAK ESSAM
    </div>

    <div class="container">
        <p style="font-family: 'Cairo', sans-serif; font-size: 1.5rem; margin-bottom: 30px;">
             حط اسمك عشان الموقع يبدأ يشتغل 🚀 
        </p>
        <input type="text" id="username" placeholder="YOUR NAME HERE">
        <button onclick="enterSite()">ENTER NOW <i class="fa-solid fa-arrow-right"></i></button>
    </div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const icon = document.querySelector('.theme-btn i');
            icon.classList.toggle('fa-moon'); icon.classList.toggle('fa-sun');
        }
        function enterSite() {
            const user = document.getElementById('username').value;
            if(user !== "") { window.location.href = "profile.html"; }
            else { alert("PLEASE ENTER YOUR NAME FIRST!"); }
        }
    </script>
</body>
</html>
